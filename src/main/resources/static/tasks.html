<!DOCTYPE html>

<html>

<head>

<title>Tasks - SkillSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2>SkillSync</h2>

<a href="index.html">Dashboard</a>
<a href="employees.html">Employees</a>
<a href="skills.html">Skills</a>
<a href="employee-skills.html">Employee Skills</a>
<a href="tasks.html">Tasks</a>
<a href="allocation.html">Smart Allocation</a>

</div>

<div class="content">

<h2 class="mb-4">Task Management</h2>

<div class="card p-4 mb-4">

    <h4>Create Task</h4>

    <input id="title"
           class="form-control mb-2"
           placeholder="Task Title">

    <input id="description"
           class="form-control mb-2"
           placeholder="Description">

    <select id="skillSelect"
            class="form-control mb-2">
    </select>

    <select id="complexity"
            class="form-control mb-2">

        <option>EASY</option>
        <option>MEDIUM</option>
        <option>HARD</option>

    </select>

    <select id="status"
            class="form-control mb-3">

        <option>PENDING</option>

    </select>

    <button class="btn btn-success"
            onclick="addTask()">

        Create Task

    </button>

</div>

<div class="card p-4">

    <h4>Task List</h4>

    <table class="table">

        <thead>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Skill</th>
            <th>Complexity</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody id="taskTable">

        </tbody>

    </table>

</div>

</div>

</div>

<script src="js/tasks.js"></script>

</body>
</html>
