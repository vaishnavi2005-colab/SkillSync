<!DOCTYPE html>

<html>

<head>


<title>Skills - SkillSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="css/style.css">


</head>

<body>

<div class="wrapper">


<div class="sidebar">

    <h2>SkillSync</h2>

    <a href="index.html">Dashboard</a>
    <a href="employees.html">Employees</a>
    <a href="skills.html">Skills</a>
    <a href="employee-skills.html">Employee Skills</a>
    <a href="tasks.html">Tasks</a>
    <a href="allocation.html">Smart Allocation</a>

</div>

<div class="content">

    <h2 class="mb-4">Skill Management</h2>

    <div class="card p-4 mb-4">

        <h4>Add Skill</h4>

        <input id="skillName"
               class="form-control mb-3"
               placeholder="Enter Skill Name">

        <button class="btn btn-success"
                onclick="addSkill()">

            Add Skill

        </button>

    </div>

    <div class="card p-4">

        <h4>Skills List</h4>

        <table class="table">

            <thead>

            <tr>
                <th>ID</th>
                <th>Skill Name</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="skillTable">

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="js/skills.js"></script>

</body>
</html>
