<!DOCTYPE html>

<html>

<head>


<title>Employee Skills - SkillSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrapper">


<div class="sidebar">

    <h2>SkillSync</h2>

    <a href="index.html">Dashboard</a>
    <a href="employees.html">Employees</a>
    <a href="skills.html">Skills</a>
    <a href="employee-skills.html">Employee Skills</a>
    <a href="tasks.html">Tasks</a>
    <a href="allocation.html">Smart Allocation</a>

</div>

<div class="content">

    <h2 class="mb-4">Employee Skill Mapping</h2>

    <div class="card p-4 mb-4">

        <h4>Skills</h4>

        <select id="employeeSelect"
                class="form-control mb-2">
        </select>

        <select id="skillSelect"
                class="form-control mb-2">
        </select>

        <select id="experienceLevel"
                class="form-control mb-3">

            <option>BEGINNER</option>
            <option>INTERMEDIATE</option>
            <option>ADVANCED</option>

        </select>

        <button class="btn btn-primary"
                onclick="assignSkill()">

            Assign Skill

        </button>

    </div>

    <div class="card p-4">

        <h4>Mappings</h4>

        <table class="table">

            <thead>

            <tr>
                <th>ID</th>
                <th>Employee</th>
                <th>Skill</th>
                <th>Experience</th>
            </tr>

            </thead>

            <tbody id="mappingTable">

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="js/employeeSkills.js"></script>

</body>
</html>
