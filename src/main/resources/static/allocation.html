<!DOCTYPE html>

<html>

<head>

<title>Smart Allocation - SkillSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrapper">

<div class="sidebar">

    <h2>SkillSync</h2>

    <a href="index.html">Dashboard</a>
    <a href="employees.html">Employees</a>
    <a href="skills.html">Skills</a>
    <a href="employee-skills.html">Employee Skills</a>
    <a href="tasks.html">Tasks</a>
    <a href="allocation.html">Smart Allocation</a>

</div>

<div class="content">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            Smart Task Allocation Engine
        </h2>

        <input
                id="title"
                class="form-control mb-3"
                placeholder="Task Title">

        <input
                id="description"
                class="form-control mb-3"
                placeholder="Task Description">

        <select
                id="skillSelect"
                class="form-control mb-3">
        </select>

        <select
                id="complexity"
                class="form-control mb-3">

            <option>EASY</option>
            <option>MEDIUM</option>
            <option>HARD</option>

        </select>

        <input
                type="datetime-local"
                id="deadline"
                class="form-control mb-3">

        <button
                class="btn btn-success btn-lg"
                onclick="allocateTask()">

            Allocate Automatically

        </button>

    </div>

    <div class="card mt-4 p-4 shadow">

        <h4>Allocation Result</h4>

        <div id="result">

            No Allocation Yet

        </div>

    </div>

</div>

</div>

<script src="js/allocation.js"></script>

</body>
</html>
